<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DG Store – App Download Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, push, remove, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChZlSz8G6KH-a14k6FiFqORUu7BMbcZ_I",
    authDomain: "dgsell.firebaseapp.com",
    databaseURL: "https://dgsell-default-rtdb.firebaseio.com",
    projectId: "dgsell",
    storageBucket: "dgsell.firebasestorage.app",
    messagingSenderId: "93914740482",
    appId: "1:93914740482:web:ca45b2a2f7c7288c1e741b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();

  // ADMIN UID — change this later in Firebase
  const ADMIN_UID = "S1gwjUAddGUlMDiRen9SdGFKktu2";

  let currentUser = null;
  let isAdmin = false;
  let allApps = [];

  /* ── Auth ── */
  window.loginWithGoogle = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) { showToast("Login failed: " + e.message, "error"); }
  };

  window.logout = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, user => {
    currentUser = user;
    isAdmin = user && user.uid === ADMIN_UID;
    renderNav();
    if (user) {
      document.getElementById("authOverlay").style.display = "none";
      loadApps();
    } else {
      document.getElementById("authOverlay").style.display = "flex";
      document.getElementById("appGrid").innerHTML = "";
    }
  });

  /* ── Load Apps ── */
  function loadApps() {
    const appsRef = ref(db, "apps");
    onValue(appsRef, snap => {
      allApps = [];
      if (snap.exists()) {
        snap.forEach(child => {
          allApps.push({ id: child.key, ...child.val() });
        });
      }
      renderApps(allApps);
    });
  }

  function renderApps(apps) {
    const grid = document.getElementById("appGrid");
    if (!apps.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>Abhi koi app available nahi hai.</p></div>`;
      return;
    }
    grid.innerHTML = apps.map(a => `
      <div class="app-card" onclick="openAppModal('${a.id}')">
        <div class="app-icon-wrap">
          <img src="${a.icon || 'https://placehold.co/80x80/1a1a2e/e0e0ff?text=APK'}" alt="${a.name}" onerror="this.src='https://placehold.co/80x80/1a1a2e/e0e0ff?text=APK'">
        </div>
        <div class="app-info">
          <h3>${a.name}</h3>
          <span class="app-cat">${a.category || "App"}</span>
          <p class="app-desc">${a.description || ""}</p>
        </div>
        <div class="app-meta">
          <span class="app-ver">v${a.version || "1.0"}</span>
          <span class="app-size">${a.size || "?"} MB</span>
        </div>
        <button class="dl-btn" onclick="event.stopPropagation(); downloadApp('${a.id}','${a.downloadUrl}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download APK
        </button>
      </div>
    `).join("");
  }

  /* ── Download ── */
  window.downloadApp = async (id, url) => {
    if (!url) { showToast("Download link not set!", "error"); return; }
    // increment download count
    const countRef = ref(db, `apps/${id}/downloads`);
    const snap = await get(countRef);
    await set(countRef, (snap.val() || 0) + 1);
    // Force download without browser warning bypass — direct link
    const a = document.createElement("a");
    a.href = url;
    a.download = "";
    a.target = "_blank";
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast("Download shuru ho gaya! ✅");
  };

  /* ── App Modal ── */
  window.openAppModal = (id) => {
    const a = allApps.find(x => x.id === id);
    if (!a) return;
    document.getElementById("modalTitle").textContent = a.name;
    document.getElementById("modalIcon").src = a.icon || "https://placehold.co/80x80/1a1a2e/e0e0ff?text=APK";
    document.getElementById("modalDesc").textContent = a.description || "Koi description nahi.";
    document.getElementById("modalVersion").textContent = a.version || "1.0";
    document.getElementById("modalSize").textContent = (a.size || "?") + " MB";
    document.getElementById("modalCat").textContent = a.category || "App";
    document.getElementById("modalDownloads").textContent = a.downloads || 0;
    document.getElementById("modalDlBtn").onclick = () => downloadApp(a.id, a.downloadUrl);
    if (isAdmin) {
      document.getElementById("modalEditBtn").style.display = "inline-flex";
      document.getElementById("modalEditBtn").onclick = () => { closeModal(); openAdminEdit(a); };
      document.getElementById("modalDeleteBtn").style.display = "inline-flex";
      document.getElementById("modalDeleteBtn").onclick = () => deleteApp(a.id);
    } else {
      document.getElementById("modalEditBtn").style.display = "none";
      document.getElementById("modalDeleteBtn").style.display = "none";
    }
    document.getElementById("appModal").classList.add("open");
  };

  window.closeModal = () => {
    document.getElementById("appModal").classList.remove("open");
  };

  /* ── Admin: Add/Edit App ── */
  window.openAdminPanel = () => {
    if (!isAdmin) return;
    document.getElementById("adminPanel").classList.add("open");
    resetAdminForm();
  };

  window.closeAdminPanel = () => {
    document.getElementById("adminPanel").classList.remove("open");
  };

  window.openAdminEdit = (a) => {
    document.getElementById("adminPanel").classList.add("open");
    document.getElementById("formAppId").value = a.id;
    document.getElementById("formName").value = a.name || "";
    document.getElementById("formVersion").value = a.version || "";
    document.getElementById("formSize").value = a.size || "";
    document.getElementById("formCategory").value = a.category || "";
    document.getElementById("formIcon").value = a.icon || "";
    document.getElementById("formDesc").value = a.description || "";
    document.getElementById("formUrl").value = a.downloadUrl || "";
    document.getElementById("adminPanelTitle").textContent = "App Edit Karo";
  };

  function resetAdminForm() {
    document.getElementById("formAppId").value = "";
    document.getElementById("formName").value = "";
    document.getElementById("formVersion").value = "";
    document.getElementById("formSize").value = "";
    document.getElementById("formCategory").value = "";
    document.getElementById("formIcon").value = "";
    document.getElementById("formDesc").value = "";
    document.getElementById("formUrl").value = "";
    document.getElementById("adminPanelTitle").textContent = "Naya App Add Karo";
  }

  window.saveApp = async () => {
    const id = document.getElementById("formAppId").value;
    const data = {
      name: document.getElementById("formName").value.trim(),
      version: document.getElementById("formVersion").value.trim(),
      size: document.getElementById("formSize").value.trim(),
      category: document.getElementById("formCategory").value.trim(),
      icon: document.getElementById("formIcon").value.trim(),
      description: document.getElementById("formDesc").value.trim(),
      downloadUrl: document.getElementById("formUrl").value.trim(),
      downloads: 0,
      updatedAt: Date.now()
    };
    if (!data.name || !data.downloadUrl) {
      showToast("Naam aur Download URL zaroori hai!", "error"); return;
    }
    try {
      if (id) {
        const snap = await get(ref(db, `apps/${id}/downloads`));
        data.downloads = snap.val() || 0;
        await set(ref(db, `apps/${id}`), data);
        showToast("App update ho gaya! ✅");
      } else {
        await push(ref(db, "apps"), data);
        showToast("Naya app add ho gaya! 🎉");
      }
      closeAdminPanel();
    } catch (e) { showToast("Error: " + e.message, "error"); }
  };

  window.deleteApp = async (id) => {
    if (!confirm("Kya aap is app ko delete karna chahte hain?")) return;
    await remove(ref(db, `apps/${id}`));
    closeModal();
    showToast("App delete ho gaya!");
  };

  /* ── Search ── */
  window.searchApps = () => {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allApps.filter(a =>
      a.name?.toLowerCase().includes(q) ||
      a.category?.toLowerCase().includes(q) ||
      a.description?.toLowerCase().includes(q)
    );
    renderApps(filtered);
  };

  /* ── Nav ── */
  function renderNav() {
    const navUser = document.getElementById("navUser");
    if (currentUser) {
      navUser.innerHTML = `
        <img src="${currentUser.photoURL}" class="nav-avatar" alt="user" onerror="this.style.display='none'">
        <span class="nav-name">${currentUser.displayName?.split(" ")[0]}</span>
        ${isAdmin ? `<button class="nav-btn admin-btn" onclick="openAdminPanel()">+ Add App</button>` : ""}
        <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
      `;
    } else {
      navUser.innerHTML = "";
    }
  }

  /* ── Toast ── */
  window.showToast = (msg, type="success") => {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show " + type;
    setTimeout(() => t.className = "toast", 3000);
  };
</script>

<style>
  :root {
    --bg: #0b0c1a;
    --surface: #13142a;
    --surface2: #1c1e38;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8ff;
    --muted: #7a7a9a;
    --border: rgba(108,99,255,0.18);
    --radius: 16px;
    --glow: 0 0 24px rgba(108,99,255,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(255,101,132,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(11,12,26,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.5rem;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .nav-logo span { color: var(--text); -webkit-text-fill-color: var(--text); }

  #navUser { display:flex; align-items:center; gap:10px; }

  .nav-avatar {
    width:34px; height:34px; border-radius:50%;
    border: 2px solid var(--accent); object-fit:cover;
  }

  .nav-name { font-size:0.9rem; font-weight:500; }

  .nav-btn {
    padding: 8px 16px; border-radius: 30px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    cursor: pointer; font-weight: 500; transition: all 0.2s;
  }

  .admin-btn {
    background: linear-gradient(135deg, #6c63ff, #8b80ff);
    color: #fff; box-shadow: 0 4px 14px rgba(108,99,255,0.4);
  }

  .admin-btn:hover { transform:translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.55); }

  .logout-btn { background: var(--surface2); color: var(--muted); }
  .logout-btn:hover { color: var(--text); }

  /* ── HERO ── */
  .hero {
    position: relative; z-index:1;
    text-align: center; padding: 60px 20px 40px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800; line-height: 1.15;
    margin-bottom: 12px;
  }

  .hero h1 .grad {
    background: linear-gradient(135deg, #6c63ff 30%, #ff6584);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .hero p { color: var(--muted); font-size:1rem; margin-bottom:28px; }

  .search-wrap {
    display: flex; max-width: 480px; margin: 0 auto;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50px; overflow: hidden;
    box-shadow: var(--glow);
  }

  #searchInput {
    flex:1; padding: 14px 22px; background:transparent;
    border:none; outline:none; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:0.95rem;
  }

  #searchInput::placeholder { color: var(--muted); }

  .search-icon {
    padding: 14px 20px; color: var(--accent);
    display:flex; align-items:center;
  }

  /* ── GRID ── */
  .section { position:relative; z-index:1; padding: 0 24px 60px; max-width:1200px; margin:0 auto; }

  .section-title {
    font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem;
    color:var(--muted); letter-spacing:1px; text-transform:uppercase;
    margin-bottom:20px;
  }

  #appGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  .app-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex; flex-direction: column; gap: 12px;
    position: relative; overflow: hidden;
  }

  .app-card::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(108,99,255,0.05), transparent);
    opacity:0; transition:opacity 0.3s;
  }

  .app-card:hover { transform:translateY(-4px); border-color: rgba(108,99,255,0.4); box-shadow: var(--glow); }
  .app-card:hover::before { opacity:1; }

  .app-icon-wrap img {
    width:64px; height:64px; border-radius:14px; object-fit:cover;
    border: 1px solid var(--border);
  }

  .app-info h3 {
    font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
    margin-bottom:4px;
  }

  .app-cat {
    display:inline-block; background:rgba(108,99,255,0.15); color:#9d96ff;
    font-size:0.72rem; font-weight:600; padding:2px 10px; border-radius:20px;
    text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;
  }

  .app-desc {
    font-size:0.83rem; color:var(--muted); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .app-meta { display:flex; gap:12px; }

  .app-ver, .app-size {
    font-size:0.75rem; color:var(--muted);
    background:var(--surface2); padding:3px 10px; border-radius:20px;
  }

  .dl-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    background: linear-gradient(135deg, #6c63ff, #8b80ff);
    color:#fff; border:none; border-radius:10px;
    padding:11px; font-family:'DM Sans',sans-serif; font-size:0.88rem;
    font-weight:600; cursor:pointer; transition:all 0.2s;
    box-shadow: 0 4px 14px rgba(108,99,255,0.35);
    margin-top:auto;
  }

  .dl-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(108,99,255,0.55); }

  .empty-state {
    grid-column:1/-1; text-align:center; padding:60px 20px;
    color:var(--muted);
  }

  .empty-icon { font-size:3rem; margin-bottom:12px; }

  /* ── AUTH OVERLAY ── */
  #authOverlay {
    position:fixed; inset:0; z-index:500;
    background: rgba(11,12,26,0.97);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:0;
  }

  .auth-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    padding:48px 40px;
    text-align:center;
    max-width:400px; width:90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), var(--glow);
    animation:floatIn 0.5s ease;
  }

  @keyframes floatIn {
    from{opacity:0;transform:translateY(30px)}
    to{opacity:1;transform:translateY(0)}
  }

  .auth-logo {
    font-family:'Syne',sans-serif; font-weight:800; font-size:2.2rem;
    background:linear-gradient(135deg,#6c63ff,#ff6584);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:8px;
  }

  .auth-sub { color:var(--muted); font-size:0.95rem; margin-bottom:36px; }

  .google-btn {
    display:flex; align-items:center; justify-content:center; gap:12px;
    width:100%; padding:14px;
    background:#fff; color:#333;
    border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600;
    cursor:pointer; transition:all 0.2s;
    box-shadow:0 4px 14px rgba(0,0,0,0.3);
  }

  .google-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }

  .google-btn img { width:22px; }

  /* ── APP MODAL ── */
  #appModal {
    position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:20px; opacity:0; pointer-events:none; transition:opacity 0.3s;
  }

  #appModal.open { opacity:1; pointer-events:all; }

  .modal-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:24px; padding:32px; width:100%; max-width:480px;
    transform:translateY(20px); transition:transform 0.3s;
    position:relative;
  }

  #appModal.open .modal-box { transform:translateY(0); }

  .modal-close {
    position:absolute; top:16px; right:16px;
    background:var(--surface2); border:none; color:var(--muted);
    width:32px; height:32px; border-radius:50%; cursor:pointer;
    font-size:1.1rem; display:flex; align-items:center; justify-content:center;
  }

  .modal-header { display:flex; gap:16px; align-items:flex-start; margin-bottom:20px; }
  .modal-header img { width:70px; height:70px; border-radius:16px; border:1px solid var(--border); }

  .modal-header h2 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:700; }
  #modalCat { margin-top:4px; display:inline-block; }

  .modal-stats { display:flex; gap:10px; margin:16px 0; }

  .stat-chip {
    background:var(--surface2); border-radius:10px; padding:8px 14px; font-size:0.8rem;
    color:var(--muted);
  }

  .stat-chip strong { color:var(--text); display:block; font-size:0.95rem; }

  #modalDesc { color:var(--muted); font-size:0.9rem; line-height:1.6; margin:16px 0; }

  .modal-actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }

  .modal-actions .dl-btn { flex:1; min-width:140px; }

  .edit-btn {
    padding:11px 18px; background:var(--surface2); color:var(--text);
    border:1px solid var(--border); border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600;
    cursor:pointer; display:none; align-items:center; gap:6px;
  }

  .delete-btn {
    padding:11px 18px; background:rgba(255,80,80,0.1); color:#ff6b6b;
    border:1px solid rgba(255,80,80,0.2); border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600;
    cursor:pointer; display:none; align-items:center; gap:6px;
  }

  /* ── ADMIN PANEL ── */
  #adminPanel {
    position:fixed; right:-100%; top:0; bottom:0; z-index:400;
    width:100%; max-width:420px;
    background:var(--surface); border-left:1px solid var(--border);
    padding:32px 28px; overflow-y:auto;
    transition:right 0.35s cubic-bezier(.4,0,.2,1);
    box-shadow:-20px 0 60px rgba(0,0,0,0.5);
  }

  #adminPanel.open { right:0; }

  .admin-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:28px;
  }

  #adminPanelTitle { font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem; }

  .panel-close {
    background:var(--surface2); border:none; color:var(--muted);
    width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
  }

  .form-group { margin-bottom:18px; }

  .form-group label {
    display:block; font-size:0.82rem; font-weight:600;
    color:var(--muted); margin-bottom:7px; text-transform:uppercase; letter-spacing:0.5px;
  }

  .form-group input, .form-group textarea, .form-group select {
    width:100%; padding:12px 16px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:0.92rem;
    outline:none; transition:border-color 0.2s;
  }

  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }

  .form-group textarea { resize:vertical; min-height:80px; }

  .save-btn {
    width:100%; padding:14px;
    background:linear-gradient(135deg,#6c63ff,#8b80ff);
    color:#fff; border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700;
    cursor:pointer; box-shadow:0 6px 20px rgba(108,99,255,0.4);
    transition:all 0.2s; margin-top:8px;
  }

  .save-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(108,99,255,0.55); }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--surface2); color:var(--text);
    padding:13px 24px; border-radius:30px;
    font-size:0.9rem; font-weight:500;
    border:1px solid var(--border);
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
    transition:transform 0.3s, opacity 0.3s;
    opacity:0; z-index:999; pointer-events:none; white-space:nowrap;
  }

  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  .toast.error { border-color:rgba(255,80,80,0.4); background:rgba(255,80,80,0.15); }

  /* ── RESPONSIVE ── */
  @media(max-width:600px) {
    nav { padding:12px 16px; }
    .hero { padding:40px 16px 28px; }
    .section { padding:0 14px 40px; }
    #appGrid { grid-template-columns:1fr; }
    .auth-box { padding:36px 24px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">DG<span>Store</span></div>
  <div id="navUser"></div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Safe Apps, <span class="grad">Direct Download</span></h1>
  <p>Sirf trusted apps — koi warning nahi, koi tension nahi.</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="App dhundo..." oninput="searchApps()">
    <div class="search-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>
</div>

<!-- APP GRID -->
<div class="section">
  <div class="section-title">Available Apps</div>
  <div id="appGrid">
    <div class="empty-state"><div class="empty-icon">⏳</div><p>Loading...</p></div>
  </div>
</div>

<!-- AUTH OVERLAY -->
<div id="authOverlay" style="display:flex">
  <div class="auth-box">
    <div class="auth-logo">DGStore</div>
    <p class="auth-sub">Apni favourite apps download karo — safely & instantly.</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google se Login Karo
    </button>
  </div>
</div>

<!-- APP MODAL -->
<div id="appModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <img id="modalIcon" src="" alt="">
      <div>
        <h2 id="modalTitle"></h2>
        <span class="app-cat" id="modalCat"></span>
      </div>
    </div>
    <div class="modal-stats">
      <div class="stat-chip"><strong id="modalVersion"></strong>Version</div>
      <div class="stat-chip"><strong id="modalSize"></strong>Size</div>
      <div class="stat-chip"><strong id="modalDownloads"></strong>Downloads</div>
    </div>
    <p id="modalDesc"></p>
    <div class="modal-actions">
      <button class="dl-btn" id="modalDlBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download APK
      </button>
      <button class="edit-btn" id="modalEditBtn">✏️ Edit</button>
      <button class="delete-btn" id="modalDeleteBtn">🗑️ Delete</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <span id="adminPanelTitle">Naya App Add Karo</span>
    <button class="panel-close" onclick="closeAdminPanel()">✕</button>
  </div>
  <input type="hidden" id="formAppId">
  <div class="form-group">
    <label>App Ka Naam *</label>
    <input type="text" id="formName" placeholder="e.g. My Awesome App">
  </div>
  <div class="form-group">
    <label>Version</label>
    <input type="text" id="formVersion" placeholder="e.g. 1.0.0">
  </div>
  <div class="form-group">
    <label>Size (MB)</label>
    <input type="text" id="formSize" placeholder="e.g. 24">
  </div>
  <div class="form-group">
    <label>Category</label>
    <input type="text" id="formCategory" placeholder="e.g. Tools, Games, Social">
  </div>
  <div class="form-group">
    <label>Icon URL</label>
    <input type="url" id="formIcon" placeholder="https://...icon.png">
  </div>
  <div class="form-group">
    <label>Description</label>
    <textarea id="formDesc" placeholder="App ke baare mein kuch batao..."></textarea>
  </div>
  <div class="form-group">
    <label>Download URL (APK Link) *</label>
    <input type="url" id="formUrl" placeholder="https://...app.apk">
  </div>
  <button class="save-btn" onclick="saveApp()">💾 Save Karo</button>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

</body>
</html>
